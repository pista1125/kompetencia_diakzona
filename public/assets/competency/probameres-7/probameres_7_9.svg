<svg width="900" height="600" viewBox="0 0 900 600" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="600" fill="#fef2f2" rx="20"/>
  <text x="450" y="50" font-family="Arial, sans-serif" font-size="28" font-weight="bold" text-anchor="middle" fill="#991b1b">Süteményrecept és Készlet</text>
  <rect x="50" y="80" width="380" height="480" fill="white" stroke="#fecaca" stroke-width="2" rx="15"/>
  <text x="240" y="120" font-family="Arial, sans-serif" font-size="22" font-weight="bold" text-anchor="middle" fill="#991b1b">Recept (12 főre):</text>
  <g transform="translate(70, 160)">
    <text x="0" y="20" font-family="Arial, sans-serif" font-size="18">Liszt: 600 g</text>
    <text x="0" y="60" font-family="Arial, sans-serif" font-size="18">Cukor: 300 g</text>
    <text x="0" y="100" font-family="Arial, sans-serif" font-size="18">Tojás: 6 db</text>
    <text x="0" y="140" font-family="Arial, sans-serif" font-size="18">Vaj: 250 g</text>
  </g>
  <rect x="470" y="80" width="380" height="480" fill="white" stroke="#fecaca" stroke-width="2" rx="15"/>
  <text x="660" y="120" font-family="Arial, sans-serif" font-size="22" font-weight="bold" text-anchor="middle" fill="#991b1b">Készlet az otthon:</text>
  <g transform="translate(490, 160)">
    <text x="0" y="20" font-family="Arial, sans-serif" font-size="18">Liszt: 1 kg (1000 g)</text>
    <text x="0" y="60" font-family="Arial, sans-serif" font-size="18">Cukor: 0,5 kg (500 g)</text>
    <text x="0" y="100" font-family="Arial, sans-serif" font-size="18">Tojás: 10 db</text>
    <text x="0" y="140" font-family="Arial, sans-serif" font-size="18">Vaj: 150 g</text>
  </g>
  <rect x="150" y="450" width="600" height="90" fill="#fee2e2" stroke="#ef4444" stroke-width="2" rx="15"/>
  <text x="450" y="485" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#7f1d1d">KÉRDÉS:</text>
  <text x="450" y="520" font-family="Arial, sans-serif" font-size="18" text-anchor="middle">Mindenből van elég a 12 főre való sütihez?</text>
</svg>
