      <text x="360" y="30" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="#2563eb">angol</text>
      <text x="490" y="30" font-family="Arial, sans-serif" font-size="18" text-anchor="middle">-</text>
      <text x="620" y="30" font-family="Arial, sans-serif" font-size="18" text-anchor="middle">-</text>
      <text x="730" y="30" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="#dc2626">filmklub</text>
    </g>
    <g transform="translate(0, 80)">
