<?xml version="1.0" encoding="UTF-8"?>
<svg width="900" height="600" viewBox="0 0 900 600" xmlns="http://www.w3.org/2000/svg">
    <rect width="900" height="600" fill="#ffffff" />
    <g transform="translate(60, 60)">
        
    <text x="0" y="30" font-family="Arial" font-size="36" font-weight="bold" fill="#ea580c">PAPA PIZZA MENÜ</text>
    
    <rect x="0" y="70" width="600" height="100" fill="#ea580c" rx="15" />
    <text x="300" y="130" font-family="Arial" font-size="32" font-weight="bold" fill="#fff" text-anchor="middle">Base Margarita Pizza: 2500 Ft</text>
    
    <g transform="translate(0, 200)">
        <rect x="0" y="0" width="300" height="200" fill="none" stroke="#ea580c" stroke-width="4" rx="15" />
        <text x="150" y="50" text-anchor="middle" font-size="28" font-weight="bold" fill="#ea580c">Extra feltétek</text>
        <text x="150" y="100" text-anchor="middle" font-size="24">Sonka: 300 Ft</text>
        <text x="150" y="140" text-anchor="middle" font-size="24">Gomba: 300 Ft</text>
        <text x="150" y="180" text-anchor="middle" font-size="24">Sajt: 300 Ft</text>
    </g>
    
    <text x="320" y="250" font-family="Arial" font-size="24" font-weight="bold" fill="#431407">Rendelés: 2 Pizza.</text>
    <text x="320" y="290" font-family="Arial" font-size="24" font-weight="bold" fill="#431407">Az egyiken 2 extra feltét,</text>
    <text x="320" y="330" font-family="Arial" font-size="24" font-weight="bold" fill="#431407">a másikon 3 extra feltét van.</text>

    </g>
</svg>