<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="400" fill="#f8fafc" rx="20"/>
  
  <!-- Option A: R-Y-R -->
  <g transform="translate(50, 50)">
    <text x="60" y="-10" font-family="Arial" font-weight="bold" fill="#1e293b" text-anchor="middle">"A" ábra</text>
    <rect width="120" height="60" fill="white" stroke="#e2e8f0" stroke-width="2" rx="10"/>
    <circle cx="30" cy="30" r="15" fill="#ef4444"/> <!-- Red -->
    <circle cx="60" cy="30" r="15" fill="#eab308"/> <!-- Yellow -->
    <circle cx="90" cy="30" r="15" fill="#ef4444"/> <!-- Red -->
  </g>

  <!-- Option B: B-Y-Y -->
  <g transform="translate(350, 50)">
    <text x="60" y="-10" font-family="Arial" font-weight="bold" fill="#1e293b" text-anchor="middle">"B" ábra</text>
    <rect width="120" height="60" fill="white" stroke="#e2e8f0" stroke-width="2" rx="10"/>
    <circle cx="30" cy="30" r="15" fill="#3b82f6"/> <!-- Blue -->
    <circle cx="60" cy="30" r="15" fill="#eab308"/> <!-- Yellow -->
    <circle cx="90" cy="30" r="15" fill="#eab308"/> <!-- Yellow -->
  </g>

  <!-- Option C: P-Y-W-P -->
  <g transform="translate(50, 250)">
    <text x="80" y="-10" font-family="Arial" font-weight="bold" fill="#1e293b" text-anchor="middle">"C" ábra</text>
    <rect width="160" height="60" fill="white" stroke="#e2e8f0" stroke-width="2" rx="10"/>
    <circle cx="30" cy="30" r="15" fill="#d946ef"/> <!-- Purple -->
    <circle cx="65" cy="30" r="15" fill="#eab308"/> <!-- Yellow -->
    <circle cx="100" cy="30" r="15" fill="#cbd5e1"/> <!-- Whiteish -->
    <circle cx="135" cy="30" r="15" fill="#d946ef"/> <!-- Purple -->
  </g>

  <!-- Option D: Y-Y-Y -->
  <g transform="translate(350, 250)">
    <text x="60" y="-10" font-family="Arial" font-weight="bold" fill="#1e293b" text-anchor="middle">"D" ábra</text>
    <rect width="120" height="60" fill="white" stroke="#e2e8f0" stroke-width="2" rx="10"/>
    <circle cx="30" cy="30" r="15" fill="#eab308"/>
    <circle cx="60" cy="30" r="15" fill="#eab308"/>
    <circle cx="90" cy="30" r="15" fill="#eab308"/>
  </g>
</svg>
