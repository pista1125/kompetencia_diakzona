<svg width="800" height="650" viewBox="0 0 800 650" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#fef08a;stop-opacity:1" /><stop offset="100%" style="stop-color:#a3e635;stop-opacity:1" /></linearGradient>
    <filter id="whiteHalo"><feMorphology operator="dilate" radius="2"/><feFlood flood-color="white" opacity="0.9"/><feComposite operator="in" in2="SourceAlpha"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="800" height="650" fill="url(#bgGrad2)" />
  <ellipse cx="420" cy="450" rx="150" ry="100" fill="#38bdf8" opacity="0.8" />
  
  <!-- Map features -->
  <path d="M 250 350 L 450 300 L 650 400 L 500 550 L 200 500 Z" stroke="#64748b" stroke-width="12" fill="none" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M 450 300 L 450 160" stroke="#64748b" stroke-width="10" fill="none" stroke-linecap="round" />
  <path d="M 650 400 L 750 400" stroke="#64748b" stroke-width="10" fill="none" stroke-linecap="round" />
  <path d="M 500 550 L 500 650" stroke="#64748b" stroke-width="10" fill="none" stroke-linecap="round" />
  <path d="M 200 500 L 50 500" stroke="#64748b" stroke-width="10" fill="none" stroke-linecap="round" />

  <text x="750" y="390" font-family="Arial" font-size="16" font-weight="bold" fill="#334155" text-anchor="middle" filter="url(#whiteHalo)">Kikötő</text>
  <text x="515" y="630" font-family="Arial" font-size="16" font-weight="bold" fill="#334155" filter="url(#whiteHalo)">Kemping</text>

  <!-- Towns -->
  <circle cx="250" cy="350" r="10" fill="#1e293b" stroke="white" stroke-width="3" />
  <text x="230" y="335" font-family="Arial" font-size="20" font-weight="bold" fill="#0f172a" filter="url(#whiteHalo)">Tóváros</text>
  <circle cx="450" cy="300" r="10" fill="#1e293b" stroke="white" stroke-width="3" />
  <text x="450" y="280" font-family="Arial" font-size="20" font-weight="bold" fill="#0f172a" text-anchor="middle" filter="url(#whiteHalo)">Halászlak</text>
  <circle cx="650" cy="400" r="10" fill="#1e293b" stroke="white" stroke-width="3" />
  <text x="670" y="420" font-family="Arial" font-size="20" font-weight="bold" fill="#0f172a" filter="url(#whiteHalo)">Révfülöp</text>
  <circle cx="500" cy="550" r="10" fill="#1e293b" stroke="white" stroke-width="3" />
  <text x="500" y="580" font-family="Arial" font-size="20" font-weight="bold" fill="#0f172a" text-anchor="middle" filter="url(#whiteHalo)">Partos</text>
  <circle cx="200" cy="500" r="10" fill="#1e293b" stroke="white" stroke-width="3" />
  <text x="180" y="530" font-family="Arial" font-size="20" font-weight="bold" fill="#0f172a" filter="url(#whiteHalo)">Hegyalja</text>

  <!-- Type 2: 4 Signs Grid at the top -->
  <!-- SIGN A -->
  <g transform="translate(45, 10)">
    <text x="-35" y="45" font-size="32" font-family="Arial" font-weight="bold" fill="#1e293b">A)</text>
    <rect width="360" height="65" rx="8" fill="#334155" stroke="white" stroke-width="3" />
    <path d="M 45 32 L 30 32 L 30 22 L 10 42 L 30 62 L 30 52 L 45 52 Z" fill="white" />
    <text x="55" y="42" fill="white" font-family="Arial" font-size="20" font-weight="bold">Halászlak</text>
    <text x="290" y="42" fill="white" font-family="Arial" font-size="20" font-weight="bold" text-anchor="end">Kikötő</text>
    <path d="M 300 32 L 315 32 L 315 22 L 335 42 L 315 62 L 315 52 L 300 52 Z" fill="white" />
  </g>
  <!-- SIGN B -->
  <g transform="translate(435, 10)">
    <text x="-35" y="45" font-size="32" font-family="Arial" font-weight="bold" fill="#1e293b">B)</text>
    <rect width="360" height="65" rx="8" fill="#334155" stroke="white" stroke-width="3" />
    <!-- Straight -->
    <path d="M 120 55 L 120 35 L 110 35 L 130 15 L 150 35 L 140 35 L 140 55 Z" fill="white" />
    <text x="160" y="42" fill="white" font-family="Arial" font-size="20" font-weight="bold">Tóváros</text>
    <!-- Right -->
    <text x="290" y="42" fill="white" font-family="Arial" font-size="20" font-weight="bold" text-anchor="end">Partos</text>
    <path d="M 300 32 L 315 32 L 315 22 L 335 42 L 315 62 L 315 52 L 300 52 Z" fill="white" />
  </g>
  <!-- SIGN C -->
  <g transform="translate(45, 85)">
    <text x="-35" y="45" font-size="32" font-family="Arial" font-weight="bold" fill="#1e293b">C)</text>
    <rect width="360" height="65" rx="8" fill="#334155" stroke="white" stroke-width="3" />
    <text x="290" y="42" fill="white" font-family="Arial" font-size="20" font-weight="bold" text-anchor="end">Révfülöp</text>
    <path d="M 300 32 L 315 32 L 315 22 L 335 42 L 315 62 L 315 52 L 300 52 Z" fill="white" />
    <path d="M 45 32 L 30 32 L 30 22 L 10 42 L 30 62 L 30 52 L 45 52 Z" fill="white" />
    <text x="55" y="42" fill="white" font-family="Arial" font-size="20" font-weight="bold">Hegyalja</text>
  </g>
  <!-- SIGN D -->
  <g transform="translate(435, 85)">
    <text x="-35" y="45" font-size="32" font-family="Arial" font-weight="bold" fill="#1e293b">D)</text>
    <rect width="360" height="65" rx="8" fill="#334155" stroke="white" stroke-width="3" />
    <!-- Straight -->
    <path d="M 60 55 L 60 35 L 50 35 L 70 15 L 90 35 L 80 35 L 80 55 Z" fill="white" />
    <text x="100" y="42" fill="white" font-family="Arial" font-size="20" font-weight="bold">Partos</text>
    <!-- Left -->
    <path d="M 230 32 L 215 32 L 215 22 L 195 42 L 215 62 L 215 52 L 230 52 Z" fill="white" />
    <text x="240" y="42" fill="white" font-family="Arial" font-size="20" font-weight="bold">Kikötő</text>
  </g>

  <!-- Only ONE Arrow -->
  <g transform="translate(575, 475)">
    <g transform="rotate(-45)">
      <path d="M -15 -10 L 15 -10 L 15 -16 L 30 0 L 15 16 L 15 10 L -15 10 Z" fill="#f97316" stroke="white" stroke-width="2" />
    </g>
  </g>
</svg>
