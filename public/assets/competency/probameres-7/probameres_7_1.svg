  <g transform="translate(65, 130)">
    <rect width="770" height="40" fill="#f1f5f9"/>
    <text x="100" y="28" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle">Idő</text>
    <text x="230" y="28" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle">Hétfő</text>
    <text x="360" y="28" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle">Kedd</text>
    <text x="490" y="28" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle">Szerda</text>
    <text x="620" y="28" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle">Csütörtök</text>
    <text x="730" y="28" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle">Péntek</text>
    <g transform="translate(0, 40)">
