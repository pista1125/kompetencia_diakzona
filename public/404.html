<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>DiákZóna</title>
    <script type="text/javascript">
      // GitHub Pages SPA redirect
      // This script takes the current URL path and converts it into a redirect
      // to the index page with the path stored in a query parameter.
      // The index page then restores the correct route using sessionStorage.
      var pathSegmentsToKeep = window.location.hostname.indexOf('github.io') !== -1 ? 1 : 0;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
  </body>
</html>
